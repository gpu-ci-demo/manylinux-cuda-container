name: Build containers


permissions:
  contents: read
  packages: write
  id-token: write

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 7 * * 1"  # Run once weekly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-build:
    name: Build containers
    strategy:
      matrix:
        cuda-version: [12_9, 13_1]
        arch: [x86_64, aarch64]
        manylinux-base: [manylinux_2_28, manylinux_2_34]
    runs-on: ${{ matrix.arch == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0  # get the non-merge commit for PRs
          fetch-tags: true # include tags to get correct version from setuptools_scm
          persist-credentials: false

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          file: Dockerfile
          push: true
          tags: ghcr.io/gpu-ci-demo/${{ matrix.manylinux-base }}_${{ matrix.arch }}_cuda${{ matrix.cuda-version }}:latest
          build-args: |
            CUDA_VERSION=${{ matrix.cuda-version }}
            NCCL_VERSION=${{ matrix.nccl-version }}
            MANYLINUX_BASE=${{ matrix.manylinux-base }}
            ARCH=${{ matrix.arch }}
